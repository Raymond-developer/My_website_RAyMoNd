<!DOCTYPE html>
<html lang="en">
<head>

    <script>
    // This runs before the page shows
    const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
     body{
      background-image: url("photo_2026-07-04_21-32-33.jpg");
      }
      button{
      font-size: 25px;
      font-weight: 700;
      margin: 7px;
      padding: 10px;
      border-radius: 5px;
    }

    .grid{
    display: grid;
    justify-self: center;
    align-items: center;
    }

    .para{
      font-size: 35px;
      font-weight: 700;
      margin-top: 250px;
    }
  </style>
</head>
<body>

  <div class="move">
  <h1 class="h1"> Welcome </h1>
  <h1> Author: RAyMoNd</h1>
  </div>
    
    <div> <button class="logout"> Log out </button> </div>
   <div> <button class="changep"> Change password </button> </div>


  <div class="grid">
   <div> <button class="Calculator"> Calculator </button> </div>
   <div> <button class="product"> Expense </button> </div>
   <div> <button class="quiz"> Quiz </button> </div>
   <div> <button class="todo"> Todo </button> </div>
    <div> <button class="game"> game </button> </div>

  </div>

  <script>
   const calculator = document.querySelector('.Calculator')
      const product = document.querySelector('.product')
         const quiz = document.querySelector('.quiz')
            const todo = document.querySelector('.todo')
               const expense = document.querySelector('.expense')
                  const changep = document.querySelector('.changep')
                     const game = document.querySelector('.game')
                      const logout = document.querySelector('.logout')

   calculator.addEventListener('click', () => {
   // console.log('hello')
      window.location.href="calculate.html"
   })         
   
   product.addEventListener('click', () => {
     window.location.href="expense.html"
   })

   quiz.addEventListener('click', () => {
     window.location.href="quiz.html"
   })

   todo.addEventListener('click', () => {
     window.location.href="todo.html"
   })

   changep.addEventListener('click', () => {
     window.location.href="change.html"
   })

   game.addEventListener('click', () => {
     window.location.href="game.html"
   })


   logout.addEventListener('click', () => {
     window.location.href="register.html"
     localStorage.removeItem('token')
    
   })
  </script>
</body>
</html>
