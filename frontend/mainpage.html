<!DOCTYPE html>
<html lang="en">
<head>

    <script>
    // This runs before the page shows
    const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    
   body {
  background-image: url("photo_2026-07-04_21-32-33.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  margin: 0;
  padding: 0;
  min-height: 100vh;
}

h1{
  display: grid;
  justify-content: center;
}

button {
  font-size: 25px;
  font-weight: 700;
  margin: 7px;
  padding: 10px;
  border-radius: 5px;
}

.grid {
  display: grid;
  justify-self: center;
  align-items: center;
}

.para {
  font-size: 35px;
  font-weight: 700;
  margin-top: 250px;
  text-align: center;
  padding: 0 5%;
}

/* Laptop: 1024px and up - your original sizes */
@media screen and (max-width: 1024px) {
  button {
    font-size: 22px;
    padding: 9px;
  }
  .para {
    font-size: 32px;
    margin-top: 200px;
  }

  h1{
  display: grid;
  justify-content: center;
}
}

/* Tablet: 768px to 1023px */
@media screen and (max-width: 768px) {
  button {
    font-size: 20px;
    padding: 8px;
    margin: 6px;
  }
  .para {
    font-size: 28px;
    margin-top: 150px;
    padding: 0 8%;
  }

  h1{
  display: grid;
  justify-content: center;
}
}

/* Phone: 767px and below */
@media screen and (max-width: 480px) {
  button {
    font-size: 18px;
    padding: 8px;
    margin: 5px;
    width: 30%;
    
  }
  .para {
    font-size: 24px;
    margin-top: 100px;
    padding: 0 10%;
  }
  .grid {
    width: 100%;
  }

  .game, .quiz, .calculator, .todo{
    margin-left: 40px;
  }

  h1{
  display: grid;
  justify-content: center;
}
}

  </style>
</head>
<body>

  <div class="move">
  <h1 class="h1"> Welcome </h1>
  <h1> Author: RAyMoNd</h1>
  </div>
    
    <div> <button class="logout"> Log out </button> </div>
   <div> <button class="changep"> Change password </button> </div>


  <div class="grid">
   <span> <button class="Calculator"> Calculator </button> 
  <span>  <button class="expense"> Expense </button> </span> </span>
   
   <div> <button class="quiz"> Quiz </button>  
   <span> <button class="todo"> Todo </button> </span> </div>
   
    <div> <button class="game"> game </button> 
    <span> <button class="product"> Product </button> </span>  </div>
    
  </div>

  <script>
   const calculator = document.querySelector('.Calculator')
      const product = document.querySelector('.product')
         const quiz = document.querySelector('.quiz')
            const todo = document.querySelector('.todo')
               const expense = document.querySelector('.expense')
                  const changep = document.querySelector('.changep')
                     const game = document.querySelector('.game')
                      const logout = document.querySelector('.logout')
                      

   calculator.addEventListener('click', () => {
      window.location.href="calculate.html"
   })         
   
   product.addEventListener('click', () => {
    // here 
     window.location.href="amazon.html"
   })

   quiz.addEventListener('click', () => {
     window.location.href="quiz.html"
   })

   todo.addEventListener('click', () => {
     window.location.href="todo.html"
   })

   changep.addEventListener('click', () => {
     window.location.href="change.html"
   })

   game.addEventListener('click', () => {
     window.location.href="game.html"
   })


   logout.addEventListener('click', () => {
     window.location.href="register.html"
     localStorage.removeItem('token')
    
   })

   expense.addEventListener('click', () => {
     window.location.href="expense.html"
   })
  </script>
</body>
</html>
