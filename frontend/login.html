<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    body{
      background-image: url("photo_2026-07-04_21-34-15.jpg");
      
    }

    .container{
       display: grid;
      justify-content: center;
      align-items: center;
      height: 370px;
      margin-top: 50px;
    }

    .p{
    font-size: 35px;
    font-weight: 700;
    }

    .name, .email, .password{
      font-size: 25px;
      padding: 12px;
      font-weight: 600;
      border: none;
      border-radius: 5px;

    }

    .link{
      font-size: 35px;
    font-weight: 700;
    color: rgb(0, 255, 213);
    }

    .span{
      margin-top: 38px;
    font-size: 30px;
    font-weight: 700;
    }

    button{
       margin-top: 25px;
    font-size: 30px;
    font-weight: 700;
    background-color: green;
    padding: 10px;
    border-radius: 10px;
    }

      h1{
      margin-left: 150px;
      font-weight: 700;
      font-size: 35px;
    }
  </style>
</head>
<body>
  
  <div class="container">
     <h1> login </h1>
    
   <p class="p"> Name</p>
   <input class="name" type="text" placeholder="Name" required>

    <p class="p"> Email </p>
   <input class="email" type="email" placeholder="Email" required>

    <p class="p" class="password"> Password </p>
   <input class="password" type="password" placeholder="Password" required>

   <button>  Sign in </button>

    <span class="span">
    Dont have account yet?
     <a class="link" href="register.html"> Register </a>
    </span>

   </div>
    

   <script>
    const Name = document.querySelector('.name')
      const email = document.querySelector('.email')
        const password = document.querySelector('.password')
         const button = document.querySelector('button')

         button.addEventListener('click', async () => {
          console.log(Name.value, email.value, password.value)

        const response = await fetch('https://my-project-beta-liard.vercel.app/login', {
            method: 'POST', 
            headers: {
                 'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: Name.value,
              email: email.value,
              password: password.value
            })
          })

        const result = await response.json() 

       console.log(result)

        if(result.status === 'ok') {
          localStorage.setItem('token', result.data)
          window.location.href="mainpage.html"
        } else {
          alert(result.error)
        }

        })
   </script>
</body>
</html>
