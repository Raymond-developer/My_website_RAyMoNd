<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
   /* === MOBILE: 320px+ === */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-image: url("photo_2026-07-04_21-34-15.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100%;
  font-family: Arial, sans-serif;
  padding: 20px 4%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

html, body {
  height: 100%;
}

h1 {
  font-weight: 700;
  font-size: 28px;
  margin: 0 0 20px 0;
  text-align: center;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  width: 100%;
}

.container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  background: rgba(0,0,0,0.4);
  padding: 25px 5%;
  border-radius: 10px;
  margin-top: 20px;
}

.p {
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  color: #fff;
}

.name, .email, .password {
  font-size: 16px;
  padding: 12px 4%;
  font-weight: 600;
  border: 1px solid #ccc;
  border-radius: 5px;
  width: 100%;
}

.name:focus, .email:focus, .password:focus {
  outline: none;
  border-color: rgb(0, 255, 213);
}

button {
  margin-top: 15px;
  font-size: 18px;
  font-weight: 700;
  background-color: green;
  color: white;
  padding: 14px 5%;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
}

button:active {
  background-color: #006400;
}

.span {
  margin-top: 20px;
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  color: #fff;
}

.link {
  font-size: 16px;
  font-weight: 700;
  color: rgb(0, 255, 213);
  text-decoration: none;
}

/* === TABLET: 600px+ === */
@media (min-width: 600px) {
  body {
    padding: 30px 5%;
  }

  h1 {
    font-size: 35px;
    margin-bottom: 30px;
  }

  .container {
    padding: 35px 6%;
    gap: 18px;
    max-width: 480px;
    margin-top: 30px;
  }

  .p {
    font-size: 25px;
  }

  .name, .email, .password {
    font-size: 18px;
    padding: 14px 4%;
  }

  button {
    font-size: 22px;
    padding: 16px 5%;
    margin-top: 20px;
  }

  .span {
    font-size: 18px;
    margin-top: 25px;
  }

  .link {
    font-size: 18px;
  }
}

/* === DESKTOP: 1024px+ === */
@media (min-width: 1024px) {
  body {
    justify-content: center;
  }

  h1 {
    font-size: 40px;
  }

  .p {
    font-size: 28px;
  }

  .name, .email, .password {
    font-size: 20px;
  }

  button {
    font-size: 24px;
  }

  .span, .link {
    font-size: 20px;
  }
}
  </style>
</head>
<body>
  
  <div class="container">
     <h1> login </h1>
    
   <p class="p"> Name</p>
   <input class="name" type="text" placeholder="Name" required>

    <p class="p"> Email </p>
   <input class="email" type="email" placeholder="Email" required>

    <p class="p" class="password"> Password </p>
   <input class="password" type="password" placeholder="Password" required>

   <button>  Sign in </button>

    <span class="span">
    Dont have account yet?
     <a class="link" href="register.html"> Register </a>
    </span>

   </div>
    

   <script>
     const Name = document.querySelector('.name')
      const email = document.querySelector('.email')
        const password = document.querySelector('.password')
         const button = document.querySelector('button')

          async function loginUser() {
          const response = await fetch('https://my-website-r-ay-mo-nd.vercel.app/login', {
            method: 'POST', 
            headers: {
                 'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: Name.value,
              email: email.value,
              password: password.value
            })
          })

        const result = await response.json() 
        return result
       }
        
          
         button.addEventListener('click', async () => {
            const result = await loginUser()
           // console.log(result.Name)

          if(result.status === 'ok') {
          localStorage.setItem('token', result.data)
          localStorage.setItem('Name', result.Name)
          window.location.href="mainpage.html"
         
        } else {
          alert(result.error)
        }

        })

   </script>
</body>
</html>
