<!DOCTYPE html>
<html lang="en">
<head>

   
  <script>
  const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
   </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    /* === MOBILE: 320px+ === */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Roboto, Arial, sans-serif;
  background-color: #f5f5f5;
  padding: 20px 4%;
  min-height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

html, body {
  height: 100%;
}

.form-div {
  border: 3px solid rgb(185, 180, 180);
  width: 100%;
  max-width: 530px;
  height: auto;
  min-height: 320px;
  margin-left: 0;
  margin-top: 20px;
  border-radius: 5px;
  background-color: rgb(223, 216, 216);
  padding: 25px 6%;
}

.login {
  font-family: Roboto, Arial, sans-serif;
  font-size: 24px;
  margin-left: 0;
  margin-bottom: 20px;
  font-weight: 700;
  margin-top: 0;
  text-align: center;
}

.username, .email, .password {
  display: block;
  width: 100%;
  font-family: Roboto, Arial, sans-serif;
  font-size: 16px;
  margin-left: 0;
  font-weight: 700;
  margin-top: 15px;
  height: 45px;
  border-radius: 5px;
  padding-left: 4%;
  padding-right: 4%;
  border: 1px solid #999;
}

.space {
  font-family: Roboto, Arial, sans-serif;
  font-size: 16px;
  margin-left: 0;
  font-weight: 600;
  margin-bottom: 20px;
  margin-top: 8px;
}

.button {
  font-family: Roboto, Arial, sans-serif;
  font-size: 18px;
  margin-left: 0;
  font-weight: 500;
  height: 50px;
  width: 100%;
  background-color: blue;
  color: white;
  margin-bottom: 15px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.button:hover {
  background-color: green;
}

.paragh {
  font-family: Roboto, Arial, sans-serif;
  font-size: 18px;
  margin-left: 0;
  font-weight: 600;
  text-align: center;
  margin-bottom: 10px;
}

.notice {
  font-family: Roboto, Arial, sans-serif;
  font-size: 18px;
  margin-left: 0;
  font-weight: 600;
  text-align: center;
  color: red;
}

/* === TABLET: 600px+ === */
@media (min-width: 600px) {
  body {
    align-items: center;
  }

  .form-div {
    margin-top: 0;
    padding: 30px 5%;
    min-height: 350px;
  }

  .login {
    font-size: 28px;
    margin-bottom: 25px;
  }

  .username, .email, .password {
    font-size: 18px;
    height: 48px;
  }

  .space {
    font-size: 18px;
  }

  .button {
    font-size: 20px;
    width: 150px;
    margin-left: 0;
  }

  .paragh {
    font-size: 20px;
    text-align: left;
  }

  .notice {
    font-size: 22px;
    text-align: left;
  }
}

/* === DESKTOP: 1024px+ === */
@media (min-width: 1024px) {
  .form-div {
    width: 530px;
    padding: 20px 70px 30px 70px;
  }

  .login {
    font-size: 30px;
    margin-left: 0;
    text-align: left;
  }

  .username, .email, .password {
    width: 400px;
    font-size: 20px;
    margin-left: 0;
    height: 40px;
  }

  .space {
    font-size: 20px;
    margin-left: 0;
  }

  .button {
    font-size: 23px;
    margin-left: 0;
    width: 130px;
  }

  .paragh {
    font-size: 23px;
    margin-left: 0;
  }

  .notice {
    font-size: 25px;
    margin-left: 0;
  }
}
  </style>
</head>
<body>
 
  <div class="form-div">

   <div class="login"> Changing password </div>
    
    <form class="form">
   <input class="password"  type="password" name="password">
   <div class="space">Password</div>

   <button class="button" type="submit" name="submit"> Change </button>

    </form>
  </div>
 

  <script>
     const form = document.querySelector('.form')

    form.addEventListener('submit', registerUser)

   async function registerUser(event) {
    event.preventDefault()
     const newPassword = document.querySelector('.password').value
    //https://my-project-three-psi-85.vercel.app
     const result = await fetch('https://my-project-three-psi-85.vercel.app/change', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
         newPassword,
         token: localStorage.getItem('token')
      })
    })

    const data = await result.json()
    if(data.status === 'ok') {
     // localStorage.setItem('token', data.data)
       alert('Password change')
    } else {
      alert(data.error)
    }
   }
  </script>
</body>
</html>
