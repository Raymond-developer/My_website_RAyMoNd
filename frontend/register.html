<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    body{
      background-image: url("photo_2026-07-04_21-32-33.jpg");
    }

    .container{
       display: grid;
      justify-content: center;
      align-items: center;
      height: 370px;
      margin-top: 50px;
    }

    .p{
    font-size: 35px;
    font-weight: 700;
    }

    .name, .email, .password{
      font-size: 25px;
      padding: 12px;
      font-weight: 600;
      border: none;
      border-radius: 5px;
    }

    .link{
      font-size: 35px;
    font-weight: 700;
    color: blue;
    }

    .span{
      margin-top: 28px;
    font-size: 30px;
    font-weight: 700;
    }

    button{
       margin-top: 25px;
    font-size: 30px;
    font-weight: 700;
    background-color: green;
    padding: 10px;
    border-radius: 10px;
    }

    h1{
      margin-left: 130px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  
  <div class="container">
    <h1> Register </h1>
    
   <p class="p"> Name</p>
   <input class="name" type="text" placeholder="Name" required>

    <p class="p"> Email </p>
   <input class="email" type="email" placeholder="Email" required>

    <p class="p" class="password"> Password </p>
   <input class="password" type="password" placeholder="Password" required>

   <button>  Sign up</button>

    <span class="span">
    Already have an accoung
     <a class="link" href="login.html"> Login </a>
    </span>

   </div>
    

   <script>
    const Name = document.querySelector('.name')
      const email = document.querySelector('.email')
        const password = document.querySelector('.password')
         const button = document.querySelector('button')

         button.addEventListener('click', async () => {

        const response = await fetch('http://localhost:8000/register', {
            method: 'POST', 
            headers: {
                 'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: Name.value,
              email: email.value,
              passwords: password.value
            })
          })

        const result = await response.json() 
         //  console.log(result)
        if(result.status === 'ok') {
          window.location.href="login.html"
        } else {
          alert(result.error)
        }



         const res = await fetch('https://my-project-tau-seven-18.vercel.app')
         const resU = await res.json() 
         console.log(resU)
         })
   </script>
</body>
</html>
