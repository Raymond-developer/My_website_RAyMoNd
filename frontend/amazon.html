<!DOCTYPE html>

      <script>
    // This runs before the page shows
    const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
     

      body {
  font-family: Roboto;
  color: rgb(33, 33, 33);
  margin: 0;
  font-size: 25px;
}

.p {

}

.images-order {
  height: 150px;
  width: 170px;
  margin-bottom: 20px;
}

.paragraph-div {
  display: grid;
  font-family: Roboto;
  font-size: 15px;
  width: 180px;
}

.order-name {
  margin: 0;
  margin-bottom: 5px;
}

.price-cents {

  margin: 0;
  margin-bottom: 45px;
  margin-top: 5px;
}

.add-button {
  padding-left: 42px;
  padding-right: 42px;
  padding-top: 10px;
  padding-bottom: 10px;

}

.add-button:hover {
  background-color: rgb(253, 245, 88);
}

.star-icon {
  color: orange;
  font-size: 25px;
}

.count-c {

}

.grid-co {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
  row-gap: 50px;
  padding-bottom: 50px;
}

.flex-direct {
  background-color: rgb(5, 5, 5);
  display: flex;
  flex-direction: row;
  height: 75px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;

}

.right-section {
  width: 25%;

  cursor: pointer;
}

.middle-section {

  align-items: center;
  justify-content: center;
}

.left-section {

  align-items: center;
  cursor: pointer;
}

.padding-top {

  font-size: 0px;
  margin-left: 40px;

.header-image {

  padding-left: 20px;

.header-image:hover {

}

.order-div {

  width: 55px;
  margin-left: 5%;
  margin-right: 40px;
  color: white;
}

.header-search {

  padding-top: 10px;
  padding-bottom: 11px;

  padding-right: 15px;

}

.search-div {

}

.order-div:hover {
  border: 1px solid white;
}

.cart-quantity {

  position: absolute;
  color: rgb(255, 222, 35);

  right: 6%;
  font-weight: 700;
  font-size: 20px;
}

.head-images {
  position: relative;
  padding-top: 4px;
}

/* Laptop: 1024px to 1439px */
@media screen and (max-width: 1439px) {
  .grid-co {
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  }
  .header-search {
    width: 85%;
  }
}

/* Tablet: 768px to 1023px */
@media screen and (max-width: 1023px) {
  .grid-co {
    grid-template-columns: 1fr 1fr 1fr 1fr;
    row-gap: 40px;
  }
  .images-order {
    height: 130px;
    width: 150px;
  }
  .paragraph-div {
    width: 160px;
    font-size: 14px;
  }
  .add-button {
    padding-left: 35px;
    padding-right: 35px;
  }
  .header-search {
    width: 80%;
    font-size: 14px;
  }
  .order-div {
    margin-left: 2%;
    margin-right: 20px;
  }
  .cart-quantity {
    right: 4%;
    font-size: 18px;
  }
}

@media screen and (max-width: 767px) {

  .right-section {

  .middle-section {
    width: 60%;
  }

    height: 25px;
    padding-left: 10px;
  }
  .header-images {
    height: 35px;
  }
  .header-search {
    width: 75%;
    padding-top: 8px;
    padding-bottom: 9px;
    font-size: 13px;
  }
  .search-div {
    height: 35px;
    width: 40px;
  }
  .search-icon {
    width: 18px;
    padding-top: 9px;
    padding-left: 11px;

    right: 2%;
    font-size: 16px;
  }
}

@media screen and (max-width: 480px) {

    grid-template-columns: 1fr;
    padding: 0 8%;
  }
  .header-search {
    width: 65%;
  }
  .order-div {
    display: none;
  }
  .cart-quantity {
    right: 1%;
  }
}

  </head>

        <div class="search-div"> <img class="search-icon" src="header/search-icon.png"> </div>
      </div>

     
        <div class="right-section">

        <div class="cart-quantity js-cart-quantity"> 0 </div>
     </div>
    </div>

     <div class="padding-top">

 <script type="module" src="scripts/amazon.js"></script>
