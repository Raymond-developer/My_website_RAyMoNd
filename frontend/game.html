<!DOCTYPE html>
 <html>
   <head>

      <script>
  const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
   </script>

     <title>Game</title>
     <style>

        /* === MOBILE: 320px+ === */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-image: url('photo_2026-07-16_19-30-11.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  min-height: 100%;
  font-family: Arial, sans-serif;
  padding: 20px 4%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

html, body {
  height: 100%;
}

.para {
  font-size: 24px;
  font-weight: 700;
  margin-top: 0;
  margin-bottom: 25px;
  text-align: center;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
  width: 100%;
  padding: 0 5%;
}

.grid {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 300px;
}

button {
  font-size: 25px;
  font-weight: 700;
  margin: 0 0 12px 0;
  padding: 16px 5%;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  width: 100%;
  background-color: rgba(255,255,255,0.95);
  color: #333;
}

button:last-child {
  margin-bottom: 0;
}

button:hover {
  background-color: rgba(255,255,255,1);
}

button:active {
  background-color: rgba(230,230,230,0.95);
  transform: scale(0.98);
}

/* === TABLET: 600px+ === */
@media (min-width: 600px) {
  body {
    padding: 30px 5%;
  }

  .para {
    font-size: 30px;
    margin-bottom: 30px;
  }
}
     </style>
   </head>
   <body>
    <div class="grid">
     <p class="para"> Rock Paper Scissor </p>
     <button onclick="
     pickComputerMove();
     
     

      let result = '';

      if (computerMove === 'rock') {
        result = 'Tie.';
      } else if (computerMove === 'paper') {
        result = 'You loose.';
      } else if (computerMove === 'scissor') {
        result = 'You win.';
      }
     if (result === 'You win.') {
      score.wins = score.wins + 1;
     } else if (result === 'You loose.') {
      score.losses += 1
     } else if (result === 'Tie.') {
      score.ties += 1
     }

     localStorage.setItem('score', JSON.stringify (score));

      
      alert(`You picked rock. Computer picked ${computerMove}. ${result}
 Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);

     ">Rock</button>


     <button onclick="
     pickComputerMove();  
     

      

     if (computerMove === 'rock') {
      result = 'You win.';
     } else if (computerMove === 'paper') {
      result = 'Tie.';
     } else if (computerMove === 'scissor') {
      result = 'You loose.';
     }
    if (result === 'You win.') {
      score.wins = score.wins + 1;
     } else if (result === 'You loose.') {
      score.losses += 1
     } else if (result === 'Tie.') {
      score.ties += 1
     }


     localStorage.setItem('score', JSON.stringify (score));


     alert(`You picked paper. Computer picked ${computerMove}. ${result}
 Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
     
     
     ">Paper</button>


     <button onclick="
     pickComputerMove();
          
     

      

     if (computerMove === 'rock') {
      result = 'You loose.';
     } else if (computerMove === 'paper') {
      result = 'You win.';
     } else if (computerMove === 'scissor') {
      result = 'Tie.';
     }

     if (result === 'You win.') {
      score.wins += 1;
     } else if (result === 'You loose.') {
      score.losses += 1
     } else if (result === 'Tie.') {
      score.ties += 1
     }
      
     localStorage.setItem('score', JSON.stringify (score));

     alert(`You picked scissor. Computer picked ${computerMove}. ${result}
      Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties} `); 

     
     ">Scissor</button>

     
    <button onclick="
     score.wins = 0;
     score.losses = 0;
     score.ties = 0;
     localStorage.removeItem('score');
    ">Reset Score</button>
    </div>
    </body>
    </body> 
     <script>

     let score = JSON.parse(localStorage.getItem('score'));

     if (score === null) {
      score = {
        wins: 0,
        losses: 0,
        ties: 0
      };
    }


     let computerMove = '';

      function pickComputerMove() {
      const randomNumber =  Math.random();
      
     if (randomNumber >= 0  && randomNumber < 1 / 3) {
     computerMove = 'rock';
     } else if (randomNumber >= 1 / 3 && randomNumber > 2 / 3) {
      computerMove = 'paper';
     } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
      computerMove = 'scissor';
     }

    }
    
      
     </script>
   </body>
 </html>
