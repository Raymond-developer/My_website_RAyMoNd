<!DOCTYPE html>
<html lang="en">
<head>
   <script>
  const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
   </script> 
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> CACULATOR </title>
  <style>
    /* === MOBILE: 320px+ === */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #1a1a1a;
  font-family: Arial, sans-serif;
  padding: 20px 4%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100%;
}

html, body {
  height: 100%;
}

.container {
  margin-left: 0;
  margin-top: 20px;
  width: 100%;
  max-width: 370px;
}

.display {
  font-size: 28px;
  color: white;
  height: 70px;
  width: 100%;
  padding: 15px 5%;
  border-radius: 10px;
  background-color: rgb(39, 38, 38);
  margin-bottom: 10px;
  text-align: right;
  overflow-x: auto;
  white-space: nowrap;
}

.div {
  width: 100%;
  display: grid;
  height: auto;
  gap: 10px;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  background-color: rgb(17, 17, 17);
  padding: 15px 4%;
  margin-top: 0;
  border-radius: 10px;
  border: none;
}

button {
  font-size: 24px;
  background-color: rgb(56, 54, 54);
  color: white;
  height: 60px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}

button:hover {
  background-color: rgb(122, 116, 116);
}

button:active {
  background-color: rgb(80, 78, 78);
}

.bu {
  background-color: rgb(216, 216, 15);
  color: #000;
}

.bu:hover {
  background-color: rgb(240, 240, 50);
}

/* === TABLET: 600px+ === */
@media (min-width: 600px) {
  body {
    align-items: center;
  }

  .container {
    margin-top: 0;
  }

  .display {
    font-size: 35px;
    height: 85px;
    padding: 18px 5%;
  }

  .div {
    gap: 15px;
    padding: 18px 4%;
  }

  button {
    font-size: 32px;
    height: 68px;
  }
}

/* === DESKTOP: 1024px+ === */
@media (min-width: 1024px) {
  .display {
    font-size: 45px;
    height: 100px;
    width: 374px;
  }

  .div {
    width: 370px;
    gap: 20px;
    padding: 18px;
  }

  button {
    font-size: 45px;
    height: 75px;
  }
}
  </style>
</head>
<body>
  <div class="container">
     <input class="display" readonly>
    <div class="div">
       <button class="bu" onclick="savebutton('+')">+</button>
       <button onclick="savebutton('7')">7</button>
       <button onclick="savebutton('8')">8</button>
       <button onclick="savebutton('9')">9</button>
       <button class="bu" onclick="savebutton('-')">-</button>
       <button onclick="savebutton('4')">4</button>
       <button onclick="savebutton('5')">5</button>
       <button onclick="savebutton('6')">6</button>
       <button class="bu" onclick="savebutton('*')">*</button>
       <button onclick="savebutton('1')">1</button>
       <button onclick="savebutton('2')">2</button>
       <button onclick="savebutton('3')">3</button>
       <button class="bu" onclick="savebutton('/')">/</button>
       <button onclick="savebutton('0')">0</button>
       <button onclick="savebutton('.')">.</button>
       <button onclick="caculate()">=</button>
       <button class="bu" onclick="cleared()">C</button>
    </div> 
  </div>

  <script>
   const display = document.querySelector('.display')

  function savebutton(input) {
     display.value += input;
  }

   function cleared() {
    display.value = "";
  }

  function caculate() {

    try {
      display.value = eval(display.value)
    } catch (err) {
      display.value = 'Error';
    }
  
  }

  </script>
</body>
</html>
