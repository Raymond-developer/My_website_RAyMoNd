<!DOCTYPE html>
<html lang="en">
<head>

  <script>
  const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
   </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> QUIZ </title>
<style>
  body{
   font-family: Roboto;
   background-color: rgb(17, 17, 202) ;
  }
  .top-div{
    margin-top: 50px;
    width: 555px;
    margin-left: 500px;
    height: 600px;
    border: 3px solid gray;
    border-radius: 7px;
    background-color: white;
  }

  .btn {
    display: block;
    margin-left: 15px;
    padding-bottom: 15px;
    padding-left: 20px;
    width: 525px;
    padding-top: 15px;
    margin-bottom: 40px;
    border-radius: 7px;
    border: 3px solid gray;
    font-size: 20px;
    font-weight: 600;
    display: grid;
    justify-content: start;
    cursor: pointer;
  }

  .btn:hover:not([disabled]){
    background: rgb(44, 43, 43);
    color: rgb(245, 241, 241);
  }

  .btn:disabled{
    cursor: no-drop;
  }

  .question{
    margin-left: 15px;
    font-size: 25px;
    font-weight: 600;
    margin-bottom: 25px;
    margin-top: -10px;
  }

  .next-btn{
    margin-top: -12px;
    margin-left: 200px;
    font-size: 25px;
    font-weight: 600;
    background-color: rgb(14, 14, 197);
    color: white;
    width: 120px;
    cursor: pointer;
    display: none;
  }

  .next-btn:hover{
    background: rgb(7, 7, 7);
    color: rgb(245, 241, 241);
  }

  .simple{
   margin-left: 15px; 
   padding-bottom: 30px;
   border-bottom: 2px solid gray;

  }

  .correct{
    background-color: rgb(20, 230, 20);
  }

  .incorrect{
    background-color: rgb(238, 19, 19);
  }
</style>
</head>
<body>
  <div class="top-div">
     <h1 class="simple"> Simple Quiz </h1>
     <div class="question"> question goes here</div>
     <div class="btnn">
      <button class="btn">answer 1</button>
      <button class="btn">answer 2</button>
      <button class="btn">answer 3</button>
      <button class="btn">answer 4</button>
     </div>
     <button class="next-btn">Next</button>
  </div>

  <script>
     const questions = [
  {
    question: "What does 'HTTP' stand for?",
    answers: [
      { text: "HyperText Transfer Protocol", correct: true },
      { text: "High Tech Transfer Process", correct: false },
      { text: "Hyperlink Text Transmission", correct: false },
      { text: "Home Tool Transfer Protocol", correct: false }
    ]
  },
  {
    question: "Which company created the React library?",
    answers: [
      { text: "Google", correct: false },
      { text: "Microsoft", correct: false },
      { text: "Meta", correct: true },
      { text: "Apple", correct: false }
    ]
  },
  {
    question: "What does 'CSS' control in web development?",
    answers: [
      { text: "Website structure", correct: false },
      { text: "Website styling and layout", correct: true },
      { text: "Database queries", correct: false },
      { text: "Server logic", correct: false }
    ]
  },
  {
    question: "Which language is known as the 'language of AI'?",
    answers: [
      { text: "Java", correct: false },
      { text: "Python", correct: true },
      { text: "C++", correct: false },
      { text: "Ruby", correct: false }
    ]
  },
  {
    question: "What does 'API' mean?",
    answers: [
      { text: "Application Programming Interface", correct: true },
      { text: "Advanced Program Integration", correct: false },
      { text: "Application Process Input", correct: false },
      { text: "Automated Program Interface", correct: false }
    ]
  },
  {
    question: "Which data structure uses LIFO order?",
    answers: [
      { text: "Queue", correct: false },
      { text: "Stack", correct: true },
      { text: "Array", correct: false },
      { text: "Linked List", correct: false }
    ]
  },
  {
    question: "What does 'SQL' stand for?",
    answers: [
      { text: "Structured Query Language", correct: true },
      { text: "Simple Query Logic", correct: false },
      { text: "Server Query Language", correct: false },
      { text: "Standard Question Line", correct: false }
    ]
  },
  {
    question: "Which port number is default for HTTPS?",
    answers: [
      { text: "80", correct: false },
      { text: "443", correct: true },
      { text: "21", correct: false },
      { text: "8080", correct: false }
    ]
  },
  {
    question: "What does 'Git' primarily do?",
    answers: [
      { text: "Compiles code", correct: false },
      { text: "Version control", correct: true },
      { text: "Hosts websites", correct: false },
      { text: "Designs UI", correct: false }
    ]
  },
  {
    question: "Which of these is NOT a JavaScript data type?",
    answers: [
      { text: "Number", correct: false },
      { text: "Boolean", correct: false },
      { text: "Character", correct: true },
      { text: "Undefined", correct: false }
    ]
  },
  {
    question: "What does 'RAM' stand for?",
    answers: [
      { text: "Read Access Memory", correct: false },
      { text: "Random Access Memory", correct: true },
      { text: "Run Active Memory", correct: false },
      { text: "Rapid Access Module", correct: false }
    ]
  },
  {
    question: "Which protocol is used to send emails?",
    answers: [
      { text: "FTP", correct: false },
      { text: "SMTP", correct: true },
      { text: "HTTP", correct: false },
      { text: "DNS", correct: false }
    ]
  }
];

  const questiomElement = document.querySelector('.question')
  const answerButtons = document.querySelector('.btnn') 
  const nextButton = document.querySelector('.next-btn')   
  
  let currentQuestionIndex = 0;
  let score = 0;
  

  
  function startQuiz() {
    let currentQuestionIndex = 0;
    let score = 0;
    nextButton.innerHTML = 'Next';
    showQuestion();
  }

  function showQuestion() {
   resetState();

    let currentQuestion = questions[currentQuestionIndex]
    let questionNo = currentQuestionIndex + 1;
    questiomElement.innerHTML = questionNo + ". " + currentQuestion.question;

    currentQuestion.answers.forEach((answer) => {
      const button = document.createElement("button")
      button.innerHTML = answer.text
      button.classList.add("btn")
      answerButtons.appendChild(button)
      if(answer.correct) {
         button.dataset.correct = answer.correct;
      }

      button.addEventListener('click', (button) => {
        const selecteBtn = button.target;
        const isCorrect = selecteBtn.dataset.correct === "true";
         if(isCorrect) {
           selecteBtn.classList.add("correct")
           score++;
         }else {
           selecteBtn.classList.add("incorrect")
         }

         Array.from(answerButtons.children).forEach((button) => {
          if(button.dataset.correct === "true"){
            button.classList.add("correct")
          }
         button.disabled = true;

         })

         nextButton.style.display = "block";
      })

    })
  };

 function resetState() {
    nextButton.style.display = "none";
    while(answerButtons.firstChild) {
      answerButtons.removeChild(answerButtons.firstChild)
    }
  } 
    


  nextButton.addEventListener("click", () => {
     if(currentQuestionIndex < questions.length) {

    currentQuestionIndex++;
    if(currentQuestionIndex < questions.length) {
      showQuestion()
   } else {
      showScore()
    }
   }else {
    startQuiz()
   } 
})

   function showScore() {
    resetState()
    questiomElement.innerHTML = `You score ${score} out of ${questions.length}`
    nextButton.innerHTML = "play again "
    nextButton.style.display = 'block'
  } 

 
  startQuiz();
  </script>
</body>
</html>
