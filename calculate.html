<!DOCTYPE html>
<html lang="en">
<head>
   <script>
  const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
   </script> 
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> CACULATOR </title>
  <style>
    .container {
      margin-left: 700px;
      margin-top: 100px;
      

    }
    .div{
      width: 370px;
      display: grid;
      height: 450px;
      gap: 20px;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      background-color: rgb(17, 17, 17);
      padding: 18px;
      margin-top: -5px;
       border-radius: 10px;
       border: none;
    }

    button{
      font-size: 45px;
       background-color: rgb(56, 54, 54);
       color: white;     
       height: 75px;     
    }

    button:hover{
      background-color: rgb(122, 116, 116);
    }

    .display {
      font-size: 45px;
      color: white;
      height: 100px;
      width: 374px;
      padding: 15px;
      border-radius: 10px;
       background-color: rgb(39, 38, 38);
    }

    .bu {
      background-color: rgb(216, 216, 15);
    }
  </style>
</head>
<body>
  <div class="container">
     <input class="display" readonly>
    <div class="div">
       <button class="bu" onclick="savebutton('+')">+</button>
       <button onclick="savebutton('7')">7</button>
       <button onclick="savebutton('8')">8</button>
       <button onclick="savebutton('9')">9</button>
       <button class="bu" onclick="savebutton('-')">-</button>
       <button onclick="savebutton('4')">4</button>
       <button onclick="savebutton('5')">5</button>
       <button onclick="savebutton('6')">6</button>
       <button class="bu" onclick="savebutton('*')">*</button>
       <button onclick="savebutton('1')">1</button>
       <button onclick="savebutton('2')">2</button>
       <button onclick="savebutton('3')">3</button>
       <button class="bu" onclick="savebutton('/')">/</button>
       <button onclick="savebutton('0')">0</button>
       <button onclick="savebutton('.')">.</button>
       <button onclick="caculate()">=</button>
       <button class="bu" onclick="cleared()">C</button>
    </div> 
  </div>

  <script>
   const display = document.querySelector('.display')

  function savebutton(input) {
     display.value += input;
  }

   function cleared() {
    display.value = "";
  }

  function caculate() {

    try {
      display.value = eval(display.value)
    } catch (err) {
      display.value = 'Error';
    }
  
  }

  </script>
</body>
</html>
