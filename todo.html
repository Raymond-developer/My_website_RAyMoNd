<!DOCTYPE html>
<html lang="en">
<head>

  <script>
  const token = localStorage.getItem('token');

    if (!token) {
      // Not logged in? Kick out immediately
      window.location.replace('/login.html');
    }
   </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOdo List</title>

  <style>
   body{
  background: linear-gradient(to right, rgb(129, 129, 153), rgb(146, 116, 125), rgb(136, 102, 102), rgb(116, 116, 74), rgb(226, 202, 202));
  min-height: 100vh; /* makes gradient cover full screen */
  margin: 0;
}

    .container{
      margin-top: 40px;
      display: grid;
      justify-content: center;
      position: relative;
    }

    .input-container{
      width: 500px;
      background-color: rgb(214, 200, 200);
      height: 180px;
      border-radius: 5px;
      padding-left: px;
      margin-left: 3px;
    }

    .title{
      margin-bottom: 60px;
      margin-left: 80px;
      margin-top: 25px;
    }

    .input{
      margin-bottom: -50px;
      font-size: 20px;
      font-weight: 600;
      width: 200px;
      height: 40px;
      border: none;
      padding-left: 20px;
      height: px;
      margin-left: 12px;
      padding-right: px;
      border-radius: 5px;
      background-color: rgb(228, 217, 217);
    }

    .add{
      margin-left: 205px;
      font-size: 35px;
      font-family: roboto Arial;
      font-weight: 700;
    }

    .radio-con{
     padding-top: px;
      padding-bottom: px;
      width: 400px;
      display: grid;
      grid-template-columns: 35px 330px 55px 10px;
      border-radius: 7px;
      margin-top: 10px;
    
    }

    .con{  
      height: 500px;
      width: 500px;
      border: 3px solid rgb(177, 168, 168);
      border-radius: 7px;
      margin-top: -4px;
      background-color: rgb(248, 246, 246);
    }

    input[type="radio"]{
      transform: scale(1.5);
      margin-left: 8px;
      margin-right: px;
    }

    .todo{
      font-size: 22px;
      font-weight: bold;
      font-family: Arial;
      
    }

    .edit{
      font-size: 20px;
      font-weight: bold;
      font-family: Arial;
    }

    .delete{
      font-size: 20px;
      font-weight: bold;
      font-family: Arial;
    }

    .de{
      font-size: 20px;
      margin-bottom: 18px;
      font-weight: bold;
      font-family: Arial; 
    }

    .bu{
      font-size: 25px;
      font-weight: 700;
    }

    .Todo{
       padding-top: 18px;
      padding-bottom: 20px;
      width: 400px;
      display: grid;
      grid-template-columns: 35px 230px 55px 10px;
      border-radius: 7px;
      margin-top: -4px;
    }
    

      .notification{
        margin-left: 750px;
      margin-top: 60px;
      position: absolute;
      padding: 15px;
      background-color: red;
      margin-bottom: px;
      font-size: 22px;
      font-weight: bold;
      color: white;
      border-radius: 8px;
       display: none;
       transition: right 0.5s ease;
      
      }

      .notification.notification{
         display: block;
         
      }

      .noti{
        display: none;
      }
  </style>
</head>
<body>

  <div class="container">
    
  <div class="input-container">  
   <h1 class="title"> Daily Activities Todo </h1>
   <form class="form">
    <span class="span"> 
      <input class="input js-todo" type="text" name="newtodo" placeholder="i will do .....">
    </span>

    <span class="add"> <button class="bu" type="submit"> + </button> </span>
    </form>
    
  </div>

    <div class="con">
  
   <!-- <span>
       <input class="radio" type="radio" name="theme">
    </span>
    <span class="todo" id="0">Go get milk</span>

    <span class="edit"> <button class="de"> Edit </button> </span>

    <span class="delete"> <button class="de"> Delete </button> </span>
    -->
  
  </div>
  <div class="noti">h</div>
  </div>
  
  <script>
   const form = document.querySelector('.form')
   const todoInput = document.querySelector('.js-todo')
  const todoListEl = document.querySelector('.con')
  const notification = document.querySelector('.noti')

   
   let todos = JSON.parse(localStorage.getItem('todo')) || []; 
   let EdithTodoId = -1

   renderTodos()

    form.addEventListener('submit', (event) => {
       event.preventDefault()

       saveTodo()
       renderTodos()
       localStorage.setItem('todo', JSON.stringify(todos))
    });

    function saveTodo() {
      const todoValue = todoInput.value

      const isEmpty = todoValue === '';

      const isDuplicate = todos.some((todo) => {
       return todo.value.toUpperCase() === todoValue.toUpperCase() 
      })

     

      if (isEmpty) {
       showNotification("Todo's input is empty")

      } else if (isDuplicate) {
         showNotification('Todo already exist')
      } else {
        if (EdithTodoId >= 0) {
        todos = todos.map((todo, index) => {
            return {
              ...todo,
              value: index === EdithTodoId ? todoValue : todo.value
            }
          });
          EdithTodoId = -1;
      } else {
         todos.push({
        value : todoValue,
        checked : false,
        color: '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0')
     })
    }
      

      todoInput.value = "";
      }
   }   
   
   function renderTodos() {
       todoListEl.innerHTML = "";
    
      todos.forEach((todo, index) => {
        todoListEl.innerHTML += `
        <div class="radio-con" id="${index}"> 
        <span>
       <input style="color: ${todo.color}" class="radio" type="radio" name="theme" data-action="check">
        </span>
        <span class="todo" data-action="check">${todo.value}</span>

        <span class="edit"> <button class="de" data-action="edit"> Edit </button> </span>

        <span class="delete"> <button class="de" data-action="delete"> Delete </button> </span>
        </div>
        `
      })
   }

   todoListEl.addEventListener('click', (event) => {
     const target = event.target
      const parentElement = target.closest('.radio-con');
        if (!parentElement) return

        const todo = parentElement
        const todoId = Number(todo.id); 

       const action = target.dataset.action

       //action === 'check' && checkTodo(todoId);
        action === 'edit' && editTodo(todoId);
       action === 'delete' && deleteTodo(todoId);

   })
 
    /* function checkTodo(todoId) {
     todos = todos.map((todo, index) => 
          ({
             ...todo,
            checked: index === todoId ? !todo.checked : todo.checked
          }));
      
      renderTodos();
      localStorage.setItem('todo', JSON.stringify(todos))
     }; */


     function editTodo(todoId) {
       todoInput.value = todos[todoId].value 
       EdithTodoId = todoId
     }

     function deleteTodo(todoId) {
     todos = todos.filter((todo, index) => index !== todoId)
      EdithTodoId = -1;
       renderTodos();
       localStorage.setItem('todo', JSON.stringify(todos))
     }

     function showNotification(msg) {
       notification.innerHTML = msg 

       notification.classList.add('notification')

       setTimeout(() => {
         notification.classList.remove('notification')
       }, 2000)
       
     }
    
  </script>
</body>
</html>
